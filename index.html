<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraForge Vault</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; background: #000; color: #D4AF37; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #vault-container { text-align: center; }
        #logo { font-size: 3rem; margin-bottom: 1rem; animation: glow 2s ease-in-out infinite; }
        input { background: #111; border: 1px solid #D4AF37; color: #D4AF37; padding: 10px; font-size: 1.2rem; border-radius: 5px; width: 80%; max-width: 300px; text-align: center; }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 5px #D4AF37, 0 0 10px #D4AF37; } 50% { text-shadow: 0 0 20px #D4AF37, 0 0 30px #D4AF37; } }
    </style>
</head>
<body>
    <div id="vault-container">
        <div id="logo">A</div>
        <input type="password" placeholder="Divine Code">
    </div>
</body>
</html>

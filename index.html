<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amandeep AuraForge</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #logo { font-size: 3.5rem; font-weight: bold; color: #D4AF37; text-shadow: 0 0 20px rgba(212,175,55,0.8); letter-spacing: 5px; cursor: pointer; transition: transform 0.3s; }
        #status { position: absolute; bottom: 20px; color: #555; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }
    </style>
</head>
<body onclick="activateSiddhi()">
    <div id="logo">AMANDEEP</div>
    <div id="status">TOUCH LOGO TO START</div>

    <script>
        function activateSiddhi() {
            const status = document.getElementById('status');
            const logo = document.getElementById('logo');
            status.innerText = "VAULT ACTIVE";
            status.style.color = "#D4AF37";
            logo.style.transform = "scale(1.1)";
            setTimeout(() => { logo.style.transform = "scale(1)"; }, 200);
        }
    </script>
</body>
</html>
